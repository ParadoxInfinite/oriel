name: CI

on:
  # On main, only re-run when code actually changed (docs-only pushes skip it).
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'web/src/**'
      - 'web/index.html'
      - 'web/package.json'
      - 'web/package-lock.json'
      - 'web/vite.config.js'
      - 'web/svelte.config.js'
      - '.github/workflows/ci.yml'
  # On PRs, always run so it's a reliable required status check for branch
  # protection (a path-filtered required check would hang docs-only PRs).
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate translation catalogs
        run: node web/scripts/check-i18n.mjs

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      # web/dist is committed (go:embed needs it for `go install`). Fail if a PR
      # changed the frontend but didn't rebuild + commit the embedded output.
      - name: Verify embedded web/dist is current
        run: |
          git diff --exit-code -- web/dist || {
            echo "::error::web/dist is stale, run 'make build' and commit web/dist."
            exit 1
          }

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (race)
        run: go test -race ./...
