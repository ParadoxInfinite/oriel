name: Release

# Cut a release two ways:
#
#   1. Push a tag (canonical):
#        git tag v0.3.0 && git push origin v0.3.0
#
#   2. Click a button (Actions → Release → "Run workflow"):
#        pick a branch, type the version (e.g. v0.3.0). It tags that branch's
#        HEAD, pushes the tag, and releases from it.
#
# Either way GoReleaser (.goreleaser.yaml) cross-compiles the static binaries,
# publishes the GitHub Release, and updates the Homebrew tap.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version to release, e.g. v0.3.0 (tags the selected branch HEAD)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags

      # Manual dispatch: validate the version, then create + push the tag so the
      # rest of the job (and GoReleaser) sees a tagged HEAD. A tag pushed with the
      # default GITHUB_TOKEN does NOT re-trigger this workflow, so there's no
      # recursion — GoReleaser runs once, right here.
      - name: Tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ inputs.tag }}
        run: |
          case "$TAG" in
            v[0-9]*) ;;
            *) echo "::error::version must look like v1.2.3 (got '$TAG')"; exit 1 ;;
          esac
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT (contents:write on ParadoxInfinite/homebrew-oriel) used by the
          # brews block to push the formula. Add it under Settings → Secrets.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
