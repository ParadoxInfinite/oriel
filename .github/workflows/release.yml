name: Release

# Two ways to cut a release:
#
#   1. Push a tag (canonical):
#        git tag v0.1.0 && git push origin v0.1.0
#
#   2. Click a button (Actions → Release → "Run workflow"):
#        pick a branch, type the version (e.g. v0.1.1). It builds from that
#        branch's current HEAD and creates the tag + release at that commit.
#
# Either way it rebuilds the frontend, cross-compiles static binaries, and
# publishes a GitHub Release with them attached.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version to release, e.g. v0.1.1 (built from the selected branch HEAD)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Tag-push gives the version via GITHUB_REF_NAME; manual dispatch gives it
      # via the typed input. Resolve once here so the build, tag, and release all
      # agree. A suffix (v1.2.3-rc1) marks the release pre-release so GitHub's
      # "latest" — which install.sh and the manual curl URLs resolve to — only
      # ever points at a stable release.
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ inputs.tag }}"
          else
            v="${GITHUB_REF_NAME}"
          fi
          case "$v" in
            v[0-9]*) ;;
            *) echo "::error::version must look like v1.2.3 (got '$v')"; exit 1 ;;
          esac
          echo "version=$v" >> "$GITHUB_OUTPUT"
          case "$v" in
            *-*) echo "prerelease=true"  >> "$GITHUB_OUTPUT" ;;
            *)   echo "prerelease=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Cross-compile binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            out="dist/oriel-${os}-${arch}"
            echo "building $out"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "$out" .
          done
          (cd dist && sha256sum oriel-* > SHA256SUMS.txt)

      - name: Publish release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          # On manual dispatch the tag may not exist yet — create it at the
          # checked-out commit. On a tag push this just restates the pushed tag.
          tag_name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/oriel-*
            dist/SHA256SUMS.txt
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.prerelease }}
