name: Release

# Tag a release to trigger this:
#   git tag v0.1.0 && git push origin v0.1.0
# It rebuilds the frontend, cross-compiles static binaries, and publishes a
# GitHub Release with them attached.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Cross-compile binaries
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            out="dist/oriel-${os}-${arch}"
            echo "building $out"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o "$out" .
          done
          (cd dist && sha256sum oriel-* > SHA256SUMS.txt)

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/oriel-*
            dist/SHA256SUMS.txt
          generate_release_notes: true
