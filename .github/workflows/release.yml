name: Release

# Tag a release to trigger this:
#   git tag v0.1.0 && git push origin v0.1.0
# It rebuilds the frontend, cross-compiles static binaries, and publishes a
# GitHub Release with them attached.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Cross-compile binaries
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            out="dist/oriel-${os}-${arch}"
            echo "building $out"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o "$out" .
          done
          (cd dist && sha256sum oriel-* > SHA256SUMS.txt)

      - name: Publish release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: |
            dist/oriel-*
            dist/SHA256SUMS.txt
          generate_release_notes: true
          # Tags with a suffix (v1.2.3-rc1) are marked pre-release, so GitHub's
          # "latest" — which install.sh and the manual curl URLs resolve to —
          # only ever points at a stable release.
          prerelease: ${{ contains(github.ref_name, '-') }}
