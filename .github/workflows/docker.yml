name: Docker image

# Builds the multi-arch container (linux/amd64 + arm64) and pushes it to GHCR.
# Kept separate from the release workflow so a Docker hiccup never blocks a
# binary release. Runs on every version tag, and on demand for a chosen tag.
#
#   ghcr.io/paradoxinfinite/oriel:<version>   (e.g. v0.7.0 and 0.7.0)
#   ghcr.io/paradoxinfinite/oriel:latest      (stable tags only)
#
# The image runs `oriel mcp` (stdio) by default; see docs/MCP.md.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build/push, e.g. v0.7.0'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Resolve tags
        id: t
        run: |
          REF="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VER="${REF#v}"
          IMG="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/oriel"
          TAGS="${IMG}:${REF},${IMG}:${VER}"
          # Move :latest only for stable (no pre-release hyphen) tags.
          case "$REF" in *-*) ;; *) TAGS="${TAGS},${IMG}:latest" ;; esac
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "version=$REF" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.t.outputs.tags }}
          build-args: |
            VERSION=${{ steps.t.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/ParadoxInfinite/oriel
            org.opencontainers.image.description=Safety-gated Docker/Colima manager over MCP
            org.opencontainers.image.licenses=Apache-2.0
          provenance: false
