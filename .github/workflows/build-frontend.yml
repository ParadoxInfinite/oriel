name: Refresh embedded frontend

# web/dist is committed (so `go install` works), but it's build output. This
# workflow rebuilds it and commits the result whenever the frontend SOURCE
# changes — the `paths` filter keeps docs-only or backend-only pushes from
# triggering a rebuild. Commits made with GITHUB_TOKEN don't re-trigger
# workflows, so this can't loop.

on:
  push:
    branches: [main]
    paths:
      - 'web/src/**'
      - 'web/index.html'
      - 'web/package.json'
      - 'web/package-lock.json'
      - 'web/vite.config.js'
      - 'web/svelte.config.js'
      - '.github/workflows/build-frontend.yml'

permissions:
  contents: write

concurrency:
  group: refresh-dist-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Commit refreshed web/dist if changed
        run: |
          if [ -z "$(git status --porcelain web/dist)" ]; then
            echo "web/dist already up to date — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/dist
          git commit -m "chore(ci): refresh embedded web/dist"
          git push
